name: Build macOS Installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build and package macOS installer
        run: pnpm run build && npx electron-builder --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Installer
          path: release/*.dmg
          retention-days: 30
          if-no-files-found: error
